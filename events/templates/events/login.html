<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — FestMS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F8F8F6;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#1A1A18}
.login-card{background:#fff;border:1px solid #E5E4DC;border-radius:12px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 4px 20px rgba(0,0,0,.07)}
.logo{text-align:center;margin-bottom:2rem}
.logo h1{font-size:24px;font-weight:700;color:#1A1A18}
.logo p{font-size:13px;color:#6B6B66;margin-top:4px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#6B6B66;text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.form-group input{width:100%;padding:9px 12px;border:1px solid #E5E4DC;border-radius:7px;font-size:14px;color:#1A1A18;outline:none;transition:border .15s}
.form-group input:focus{border-color:#1D9E75;box-shadow:0 0 0 3px rgba(29,158,117,.1)}
.btn-login{width:100%;padding:10px;background:#1D9E75;color:#fff;border:none;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;transition:background .15s}
.btn-login:hover{background:#085041}
.error{background:#FCEBEB;color:#A32D2D;border:1px solid #F7C1C1;border-radius:7px;padding:9px 12px;font-size:13px;margin-bottom:14px}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <h1>🎉 FestMS</h1>
    <p>College Fest Management System</p>
  </div>
  {% if form.errors %}
  <div class="error">Invalid username or password.</div>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" autofocus autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login">Sign in →</button>
  </form>
</div>
</body>
</html>
